<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kananek Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            background: #1e1e1e;
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            padding: 40px 20px;
            border: 1px solid #2d2d2d;
        }

        .profile-img-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #ff79c6;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .nickname {
            font-size: 1.2rem;
            color: #ff79c6;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .info-section {
            text-align: left;
            background: #252525;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .info-title {
            font-size: 1.1rem;
            color: #aeafb0;
            margin-bottom: 10px;
            border-bottom: 1px solid #3a3a3a;
            padding-bottom: 5px;
            font-weight: 600;
        }

        .info-item {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .info-item strong {
            color: #ff79c6;
        }

        .hobby-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .tag {
            background: #333333;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .tag:hover {
            background: #ff79c6;
            color: #121212;
            border-color: #ff79c6;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-img-container">
            <img src="66547.jpg" alt="กัณฑ์เอนก ก้อนทอง" class="profile-img">
        </div>

        <h1 class="name-title">นายกัณฑ์เอนก ก้อนทอง</h1>
        <p class="nickname">" BEST "</p>

        <div class="info-section">
            <h2 class="info-title">ABOUT ME</h2>
            <div class="info-item">📅 <strong>วันเกิด:</strong> วันอาทิตย์ที่ 20 กุมภาพันธ์ พ.ศ. 2549</div>
            <div class="info-item">🏫 <strong>การศึกษา:</strong> มหาวิทยาลัยกาฬสินธุ์</div>
            <div class="info-item">🎓 <strong>คณะ:</strong> วิศวกรรมศาสตร์</div>
            <div class="info-item">💻 <strong>สาขา:</strong> วิศวกรรมคอมพิวเตอร์</div>
        </div>

        <div class="info-section">
            <h2 class="info-title">INTERESTS & HOBBIES</h2>
            <div class="hobby-tags">
                <span class="tag">🎮 เล่นเกม</span>
                <span class="tag">🏀 บาสเกตบอล</span>
                <span class="tag">🐱 ชอบแมว</span>
                <span class="tag">🎵 ฟังเพลง (PURPEECH)</span>
            </div>
        </div>
    </div>

</body>
</html>
